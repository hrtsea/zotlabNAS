<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NAS Monitor - Fan Control Mock (640x172)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: monospace; background: #0a0a15; color: #fff; padding: 30px 20px; }
  h1 { text-align: center; color: #60a5fa; margin-bottom: 8px; font-size: 1.4em; }
  .subtitle { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 0.85em; }
  .nav { text-align: center; margin-bottom: 24px; }
  .nav a { color: #60a5fa; text-decoration: none; margin: 0 8px; font-size: 0.85em; }
  .nav a:hover { text-decoration: underline; }

  .device { width: 640px; height: 172px; background: #000; border: 4px solid #1a1a2e; border-radius: 8px; overflow: hidden; margin: 0 auto; }
  .screen { width: 100%; height: 100%; display: flex; flex-direction: column; }

  .statusbar { height: 35px; display: flex; align-items: center; padding: 0 8px; border-bottom: 2px solid #333; font-size: 14px; }
  .statusbar .title { color: #40E0D0; font-weight: 600; width: 100px; }

  .main-area { flex: 1; display: flex; flex-direction: row; padding: 4px; gap: 8px; }

  .fan-info { width: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  .fan-icon { width: 80px; height: 80px; border: 3px solid #40E0D0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fan-rpm { font-size: 18px; color: #40E0D0; font-weight: 700; margin-top: 4px; }
  .fan-pwm { font-size: 12px; color: #666; }

  .fan-control { flex: 1; display: flex; flex-direction: column; padding: 4px; }

  .mode-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .mode-btn { flex: 1; height: 30px; background: #333; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .mode-btn.active { background: #40E0D0; color: #000; }

  .slider-area { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .slider-label { display: flex; justify-content: space-between; font-size: 12px; }
  .slider-bar { height: 18px; background: #333; border-radius: 5px; position: relative; overflow: hidden; }
  .slider-fill { height: 100%; background: #40E0D0; border-radius: 5px; }
  .slider-thumb { width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; top: -1px; }

  .curve-area { flex: 1; display: flex; flex-direction: column; padding: 4px; border-left: 2px solid #333; }
  .curve-title { font-size: 12px; color: #666; margin-bottom: 4px; }
  .curve-grid { height: 60px; position: relative; background: linear-gradient(to top, #333 1px, transparent 1px); background-size: 100% 15px; }
  .curve-line { position: absolute; bottom: 0; left: 0; right: 0; height: 100%; background: linear-gradient(to top, transparent, transparent), linear-gradient(to right, #40E0D0 0%, #FF8C00 50%, #FF4500 100%); clip-path: polygon(0% 75%, 25% 70%, 50% 40%, 75% 20%, 100% 5%, 100% 100%, 0% 100%); }
  .curve-points { position: absolute; bottom: 0; left: 0; right: 0; height: 100%; }
  .curve-point { position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; transform: translate(-50%, 50%); }
  .curve-point:nth-child(1) { left: 0%; bottom: 25%; }
  .curve-point:nth-child(2) { left: 25%; bottom: 30%; }
  .curve-point:nth-child(3) { left: 50%; bottom: 60%; }
  .curve-point:nth-child(4) { left: 75%; bottom: 80%; }
  .curve-point:nth-child(5) { left: 100%; bottom: 95%; }
  .curve-labels { display: flex; justify-content: space-between; font-size: 10px; color: #666; }

  .temp-display { height: 30px; display: flex; align-items: center; justify-content: center; gap: 16px; border-top: 2px solid #333; font-size: 14px; }
  .temp-item { text-align: center; }
</style>
</head>
<body>
<h1>🔧 Fan Control (640×172)</h1>
<p class="subtitle">Auto/Manual Mode · Fan Curve · Temperature Monitor</p>
<div class="nav"><a href="ui_mock_overview.html">&larr; Overview</a> | <a href="project_spec.html">Back to Spec</a></div>

<div class="device">
  <div class="screen">
    <div class="statusbar"><div class="title">FAN CONTROL</div><div style="margin-left:auto">CTRL TEMP: 42°C</div></div>
    <div class="main-area">
      <div class="fan-info">
        <div class="fan-icon">F</div>
        <div class="fan-rpm">1420 RPM</div>
        <div class="fan-pwm">45% PWM</div>
      </div>
      <div class="fan-control">
        <div class="mode-row">
          <div class="mode-btn active">AUTO</div>
          <div class="mode-btn">MANUAL</div>
        </div>
        <div class="slider-area">
          <div class="slider-label"><span>PWM</span><span>45%</span></div>
          <div class="slider-bar"><div class="slider-fill" style="width:45%"></div><div class="slider-thumb" style="left:45%"></div></div>
        </div>
      </div>
      <div class="curve-area">
        <div class="curve-title">Fan Curve</div>
        <div class="curve-grid"><div class="curve-line"></div><div class="curve-points"><div class="curve-point"></div><div class="curve-point"></div><div class="curve-point"></div><div class="curve-point"></div><div class="curve-point"></div></div></div>
        <div class="curve-labels"><span>25°C</span><span>35°C</span><span>45°C</span><span>55°C</span><span>65°C</span></div>
      </div>
    </div>
    <div class="temp-display">
      <div class="temp-item"><span style="color:#40E0D0">CPU: 42°C</span></div>
      <div class="temp-item"><span style="color:#FF8C00">SYS: 45°C</span></div>
      <div class="temp-item"><span style="color:#22c55e">DISK: 38°C</span></div>
    </div>
  </div>
</div>
</body>
</html>
