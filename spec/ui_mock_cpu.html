  .chart-y-axis { position: absolute; right: 4px; top: 20px; bottom: 20px; display: flex; flex-direction: column; justify-content: space-between; font-size: 8px; color: #666; }
  .chart-x-axis { position: absolute; left: 4px; bottom: 4px; font-size: 8px; color: #666; }

  .chart-line { position: absolute; top: 20px; left: 0; right: 0; bottom: 20px; }
  .chart-path { fill: url(#chartGradient); stroke: #40E0D0; stroke-width: 2; }
  .chart-area-fill { fill: url(#chartGradient); }

  .info-panel { height: 48px; background: #000; border-top: 1px solid #333; display: flex; padding: 4px 8px; gap: 16px; }
  .info-section { flex: 1; display: flex; flex-direction: column; gap: 2px; }

<script>
class CPUDataGenerator {
  constructor() {
    this.counter = 0;
    this.data = {
      cpu_pct: 25,
      temp_cpu: 42,
      freq: 2.0,
      cores: 4,
      logical: 4,
      processes: 128,
      threads: 256,
      uptime: 12 * 3600 + 8 * 60,
      cache: 4,
      core_usages: [20, 25, 30, 35]
    };
  }

  generate() {
    this.counter++;
    
    // CPU 使用率
    this.data.cpu_pct = 25.0 + (this.counter % 30);
    
    // CPU 温度
    this.data.temp_cpu = 42 + (this.counter % 10);
    
    // 核心使用率
    for (let i = 0; i < 4; i++) {
      this.data.core_usages[i] = 20.0 + ((this.counter + i * 10) % 40);
    }
    
    // 进程数
    this.data.processes = 120 + (this.counter % 20);
    
    // 线程数
    this.data.threads = this.data.processes * 2;
    
    // 运行时间
    this.data.uptime += 1;
    
    return this.data;
  }

  formatUptime(seconds) {
    const days = Math.floor(seconds / 86400);
    const hours = Math.floor((seconds % 86400) / 3600);
    if (days > 0) return days + 'd ' + hours + 'h';
    const mins = Math.floor((seconds % 3600) / 60);
    return hours + ':' + mins.toString().padStart(2, '0');
  }
}

function updateCPUUI() {
  const data = cpuMock.generate();
  
  // 更新利用率
  const usageValue = document.querySelector('.info-section.double .value');
  usageValue.textContent = Math.round(data.cpu_pct) + '%';
  
  // 更新温度
  const tempValue = document.querySelectorAll('.info-grid .grid-item')[2].querySelector('.value');
  tempValue.textContent = data.temp_cpu + '°C';
  
  // 更新进程数
  const processValue = document.querySelectorAll('.info-section')[2].querySelector('.value');
  processValue.textContent = data.processes;
  
  // 更新线程数
  const threadValue = document.querySelectorAll('.info-section')[3].querySelector('.value');
  threadValue.textContent = data.threads;
  
  // 更新运行时间
  const uptimeValue = document.querySelectorAll('.info-section')[4].querySelector('.value');
  uptimeValue.textContent = cpuMock.formatUptime(data.uptime);
  
  // 更新核心使用率
  const coreBars = document.querySelectorAll('.chart-bar');
  coreBars.forEach((bar, index) => {
    const usage = data.core_usages[index % 4];
    bar.style.height = usage + '%';
    if (usage > 80) bar.className = 'chart-bar critical';
    else if (usage > 60) bar.className = 'chart-bar high';
    else bar.className = 'chart-bar';
  });
  
  // 更新图表路径
  const svgPath = document.querySelector('.chart-path');
  const areaPath = document.querySelector('.chart-area-fill');
  let pathData = 'M0,' + (80 - data.core_usages[0] * 0.8);
  let areaData = 'M0,80 L0,' + (80 - data.core_usages[0] * 0.8);
  
  for (let i = 1; i < 18; i++) {
    const x = (i * 620) / 17;
    const y = 80 - (data.core_usages[i % 4] + Math.sin(i * 0.5) * 5) * 0.8;
    pathData += ' Q' + (x - 10) + ',' + (80 - data.core_usages[(i-1) % 4] * 0.8) + ' ' + x + ',' + y;
    areaData += ' T' + x + ',' + y;
  }
  
  svgPath.setAttribute('d', pathData);
  areaPath.setAttribute('d', areaData + ' L620,80 Z');
}

const cpuMock = new CPUDataGenerator();
setInterval(updateCPUUI, 1000);
updateCPUUI();

  function closeCPU() {
    window.location.href = 'ui_mock_overview.html';
