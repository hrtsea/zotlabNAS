<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NAS Monitor - Boot Screen Mock (640×172)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Montserrat', monospace; background: #0a0a15; color: #fff; padding: 30px 20px; }
  h1 { text-align: center; color: #60a5fa; margin-bottom: 8px; font-size: 1.4em; }
  .subtitle { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 0.85em; }
  .nav { text-align: center; margin-bottom: 24px; }
  .nav a { color: #60a5fa; text-decoration: none; margin: 0 8px; font-size: 0.85em; }
  .nav a:hover { text-decoration: underline; }

  .device { width: 640px; height: 172px; background: #000; border: 4px solid #1a1a2e; border-radius: 8px; overflow: hidden; margin: 0 auto; }
  .screen { width: 100%; height: 100%; position: relative; background: #000; }

  .logo { font-size: 42px; font-weight: bold; color: #00E676; letter-spacing: 2px; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); margin-top: -40px; }
  .version { font-size: 14px; color: #888; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); margin-top: 10px; }

  .progress-container { width: 200px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); margin-top: 40px; }
  .progress-bar { height: 100%; width: 0%; background: #00E676; border-radius: 4px; transition: width 0.5s ease-out; }

  .status { font-size: 12px; color: #fff; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); margin-top: 60px; }

  @keyframes logoGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(0,230,118,0.3); }
    50% { text-shadow: 0 0 20px rgba(0,230,118,0.5), 0 0 30px rgba(0,230,118,0.3); }
  }
  .logo { animation: logoGlow 2s ease-in-out infinite; }

  .screen-label { text-align: center; margin-top: 8px; color: #94a3b8; font-size: 0.8em; }
</style>
</head>
<body>
<h1>🚀 Boot Screen (640×172)</h1>
<p class="subtitle">Splash Screen · Boot Animation · System Initialization</p>
<div class="nav"><a href="ui_mock_overview.html">Overview</a> | <a href="ui_mock_storage.html">Storage</a> | <a href="ui_mock_settings.html">Settings</a> | <a href="ui_mock_cpu.html">CPU</a> | <a href="project_spec.html">Spec</a></div>

<div class="device">
  <div class="screen" id="splashScreen">
    <div class="logo" id="logoLabel">ZotLab Z6</div>
    <div class="version" id="versionLabel">v1.0.0</div>
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status" id="statusLabel">Initializing system...</div>
  </div>
</div>
<div class="screen-label">Boot Sequence - Loading system components</div>

<script>
  function updateProgress(stage, message) {
    const progress = stage * 25;
    document.getElementById('progressBar').style.width = progress + '%';
    if (message) {
      document.getElementById('statusLabel').textContent = message;
    }
  }

  const stages = [
    { stage: 1, message: "Loading system components..." },
    { stage: 2, message: "Initializing storage subsystem..." },
    { stage: 3, message: "Starting network services..." },
    { stage: 4, message: "Boot complete!" }
  ];

  let index = 0;
  function runStage() {
    if (index < stages.length) {
      const { stage, message } = stages[index];
      updateProgress(stage, message);
      index++;
      setTimeout(runStage, 750);
    }
  }

  window.addEventListener('load', function() {
    setTimeout(runStage, 500);
  });
</script>
</body>
</html>
