<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NAS Monitor - Boot Screen Mock (640×172)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: monospace; background: #0a0a15; color: #fff; padding: 30px 20px; }
  h1 { text-align: center; color: #60a5fa; margin-bottom: 8px; font-size: 1.4em; }
  .subtitle { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 0.85em; }
  .nav { text-align: center; margin-bottom: 24px; }
  .nav a { color: #60a5fa; text-decoration: none; margin: 0 8px; font-size: 0.85em; }
  .nav a:hover { text-decoration: underline; }

  .device { width: 640px; height: 172px; background: #000; border: 4px solid #1a1a2e; border-radius: 8px; overflow: hidden; margin: 0 auto; }
  .screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }

  .logo { font-size: 36px; font-weight: bold; color: #40E0D0; letter-spacing: 2px; }
  .version { font-size: 14px; color: #666; margin-top: 8px; }

  .progress-container { width: 200px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 20px; }
  .progress-bar { height: 100%; width: 0%; background: #40E0D0; border-radius: 4px; transition: width 0.5s ease-out; }

  .status { font-size: 12px; color: #fff; margin-top: 12px; text-align: center; }

  /* Boot animation stages */
  .stage-1 .progress-bar { width: 25%; }
  .stage-2 .progress-bar { width: 50%; }
  .stage-3 .progress-bar { width: 75%; }
  .stage-4 .progress-bar { width: 100%; }

  @keyframes logoGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(64,224,208,0.3); }
    50% { text-shadow: 0 0 20px rgba(64,224,208,0.5), 0 0 30px rgba(64,224,208,0.3); }
  }
  .logo { animation: logoGlow 2s ease-in-out infinite; }

  .screen-label { text-align: center; margin-top: 8px; color: #94a3b8; font-size: 0.8em; }
</style>
</head>
<body>
<h1>🚀 Boot Screen (640×172)</h1>
<p class="subtitle">Splash Screen · Boot Animation · System Initialization</p>
<div class="nav"><a href="ui_mock_overview.html">Overview</a> | <a href="ui_mock_storage.html">Storage</a> | <a href="ui_mock_settings.html">Settings</a> | <a href="ui_mock_cpu.html">CPU</a> | <a href="project_spec.html">Spec</a></div>

<div class="device">
  <div class="screen" id="splashScreen">
    <div class="logo">TuneBar</div>
    <div class="version">v1.0.0</div>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status" id="statusLabel">Initializing system...</div>
  </div>
</div>
<div class="screen-label">Boot Sequence - Loading system components</div>

<script>
  const bootStages = [
    { stage: 1, message: "Loading system components..." },
    { stage: 2, message: "Initializing storage subsystem..." },
    { stage: 3, message: "Starting network services..." },
    { stage: 4, message: "Boot complete!" }
  ];

  let currentStage = 0;
  const splashScreen = document.getElementById('splashScreen');
  const statusLabel = document.getElementById('statusLabel');

  function runBootSequence() {
    let index = 0;
    function nextStage() {
      if (index < bootStages.length) {
        const { stage, message } = bootStages[index];
        splashScreen.className = 'screen stage-' + stage;
        statusLabel.textContent = message;
        index++;
        setTimeout(nextStage, 750);
      }
    }
    setTimeout(nextStage, 500);
  }

  window.addEventListener('load', function() {
    setTimeout(runBootSequence, 300);
  });
</script>
</body>
</html>
