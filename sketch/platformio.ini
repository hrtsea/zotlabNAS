; ESP32 Hardware Development Template
; PlatformIO Configuration
; Waveshare ESP32-S3-Touch-LCD-3.49

[env:esp32-s3-devkitc1-n16r8]
; Platform: ESP32 Arduino Core 3.x
platform = https://github.com/pioarduino/platform-espressif32.git#879780c5a96fe00c2d4df0be5e5fcb0c0c48c83f
board = esp32-s3-devkitc1-n16r8
framework = arduino

; Filesystem
board_build.filesystem = littlefs
board_build.partitions = partitions/7MB_app_ota_2MB_littlefs.csv

; Library Dependencies
lib_deps = 
    lvgl/lvgl@^8.3.11
    bblanchon/ArduinoJson@^7.4.2

; Build Flags
build_flags = 
    -DBOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=3
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -I src
    -I src/lvgl_port
    -I src/touch

; Serial Configuration
monitor_speed = 115200
upload_speed = 921600

; Build Type
build_type = debug
monitor_filters = esp32_exception_decoder
