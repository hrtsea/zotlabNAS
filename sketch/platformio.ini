; ESP32 Hardware Development Template
; PlatformIO Configuration
[env:esp32-s3-devkitc1-n16r8]
; 使用 Git URL + commit hash 固定版本，避免每次编译检查更新
; 对应版本: 55.3.35 (tag: 55.03.35)
platform = https://github.com/pioarduino/platform-espressif32.git#879780c5a96fe00c2d4df0be5e5fcb0c0c48c83f
board = esp32-s3-devkitc1-n16r8
framework = arduino

; 分区表（可根据需要修改）
board_build.partitions = partitions/7MB_app_ota_2MB_littlefs.csv

; 构建标志
build_flags =
    -DBOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=3
    -I src
    -I include

; 串口配置
monitor_speed = 115200
upload_speed = 921600

; 构建类型
build_type = debug
monitor_filters = esp32_exception_decoder
; ------------------
