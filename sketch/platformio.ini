; PIO Arduino https://github.com/pioarduino/platform-espressif32/releases
[env:esp32-s3-devkitc1-n16r8]
; 使用 Git URL + commit hash 固定版本，避免每次编译检查更新
; 对应版本: 55.3.35 (tag: 55.03.35)
platform = https://github.com/pioarduino/platform-espressif32.git#879780c5a96fe00c2d4df0be5e5fcb0c0c48c83f
; 原在线源（已替换为 commit hash 方式）
; platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.35/platform-espressif32.zip
board = esp32-s3-devkitc1-n16r8
framework = arduino

board_build.filesystem = littlefs
board_build.partitions = partitions/7MB_app_ota_2MB_littlefs.csv


; 库已下载到项目 lib 目录，PlatformIO 会自动扫描
; 如需恢复在线依赖，取消注释下面的行
; lib_deps = 
; 	lvgl/lvgl@^8.3.11
; 	bblanchon/ArduinoJson@^7.4.2
	
build_flags = 

  	-DCONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC=y
    -DBOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=3 ;warn
	-D LV_CONF_INCLUDE_SIMPLE
	-D LV_LVGL_H_INCLUDE_SIMPLE
	-I src
	-I src/ui
	-I include


monitor_speed = 115200
upload_speed = 115200

build_type = debug
monitor_filters = esp32_exception_decoder, default
; ------------------
